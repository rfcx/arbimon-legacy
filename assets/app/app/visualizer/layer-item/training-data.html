<div class="layer">
    <h5 class="collapse-title" 
        ng-attr-tooltip="{{ tieringGuard.isViewOnly ? 'This project is currently view-only' : 'Used for Random Forest Algorithm' }}" 
        ng-click="!tieringGuard.isViewOnly && (layer.is_open = !layer.is_open)"
        ng-style="(tieringGuard.isViewOnly || tieringGuard.loading) && {'cursor': 'not-allowed', 'opacity': '0.7'}">
        
        <i class="fa fa-circle-o-notch fa-spin mr-1" ng-if="tieringGuard.loading"></i>

        <i class="fa" 
        ng-if="!tieringGuard.isViewOnly && !tieringGuard.loading"
        ng-class="layer.is_open ? 'fa-chevron-down' : 'fa-chevron-right'"></i>

        <i class="fa fa-lock mr-1" ng-if="tieringGuard.isViewOnly && !tieringGuard.loading"></i>

        Training Sets (RF Algorithm)
    </h5>
    <div class="" ng-show="layer.is_open">
        
        <ui-select class="inline-block" ng-model="layer.training_data.tset" theme="bootstrap" style="width:280px">
            <ui-select-match placeholder="Select a training set">{{ $select.selected.name }}</ui-select-match>
            <ui-select-choices repeat="tset in layer.training_data.tset_list | filter:$select.search">
                {{ tset.name }}
            </ui-select-choices>
        </ui-select>
        <button class="btn btn-default inline-block" 
            tooltip="Create a new training set" 
            tooltip-placement="right" 
            tooltip-append-to-body="true" 
            ng-click="layer.training_data.add_new_tset()"
            style="vertical-align:top;">
            <i class="fa fa-plus"></i>
        </button>
    </div>
    <div ng-show="layer.is_open && layer.is_open">
        <div ng-include="layer.training_data.data.typedef.templates.layer_item" ></div>
    </div>
</div>
